<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Oikos</title>
  <style>
    body {
      background-color: #014421; /* Forest green */
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      margin: 30px;
    }

    h1 {
      color: #ffeb3b;
      font-size: 26px;
      margin-bottom: 10px;
    }

    label {
      font-size: 18px;
    }

    select, button {
      padding: 10px;
      margin: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
    }

    select {
      background-color: #056632;
      color: #ffeb3b;
    }

    button {
      font-weight: bold;
      cursor: pointer;
    }

    .generate {
      background-color: #ffeb3b;
      color: #014421;
    }

    .generate:hover {
      background-color: #fdd835;
    }

    .results {
      margin-top: 30px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .player-block {
      background-color: rgba(255, 255, 255, 0.1);
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .player-block strong {
      font-size: 18px;
      display: block;
      margin-bottom: 8px;
    }

    .animal-name {
      font-size: 18px;
      font-weight: bold;
      margin-top: 4px;
    }

    .animal-info {
      font-size: 14px;
      margin-top: 3px;
    }
  </style>
</head>

<body>
  <h1>🐯 Oikos 🐯</h1>

  <label for="players">Número de jogadores:</label>
  <select id="players">
    <option value="2" selected>2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
    <option value="6">6</option>
  </select>
  <br>
  <button class="generate" onclick="generateMatch()">Monte uma partida!</button>

  <div class="results" id="results"></div>

  <script>
    const animals = [
      { pop: "1️⃣", name: "🐯 Onça-Pintada", type: "🟥 Predador", complex: "🔵 Muito Fácil" },
      { pop: "3️⃣", name: "🐺 Lobo-Guará", type: "🟧 Subpredador", complex: "🟡 Médio" },
      { pop: "4️⃣", name: "🦔 Tatu-Bola", type: "🟨 Meio", complex: "🔵 Muito Fácil" },
      { pop: "6️⃣", name: "🐦‍⬛ Arara-Azul", type: "🟨 Meio", complex: "🟠 Difícil" },
      { pop: "7️⃣", name: "🐒 Macaco-Prego", type: "🟦 Base", complex: "🟢 Fácil" },
      { pop: "8️⃣", name: "🦝 Quati", type: "🟦 Base", complex: "🟢 Fácil" },
      { pop: "1️⃣", name: "🐦‍🔥 Harpia", type: "🟥 Predador", complex: "🟠 Difícil" },
      { pop: "4️⃣", name: "🦩 Colhereiro", type: "🟨 Meio", complex: "🟡 Médio" },
      { pop: "5️⃣", name: "🦤 Tucano", type: "🟨 Meio", complex: "🟡 Médio" },
      { pop: "7️⃣", name: "🦜 Papagaio-Charão", type: "🟦 Base", complex: "🟢 Fácil" },
      { pop: "8️⃣", name: "🐦 Quero-Quero", type: "🟦 Base", complex: "🟡 Médio" },
      { pop: "9️⃣", name: "🐤 Canário-da-Terra", type: "🟦 Base", complex: "🟢 Fácil" },
      { pop: "2️⃣", name: "🐊 Jacaré", type: "🟥 Predador", complex: "🟡 Médio" },
      { pop: "3️⃣", name: "🐍 Sucuri", type: "🟧 Subpredador", complex: "🟠 Difícil" },
      { pop: "4️⃣", name: "🐢 Jabuti", type: "🟨 Meio", complex: "🟢 Fácil" },
      { pop: "5️⃣", name: "🪱 Coral", type: "🟨 Meio", complex: "🟠 Difícil" },
      { pop: "7️⃣", name: "🦕 Iguana-Verde", type: "🟨 Meio", complex: "🟠 Difícil" },
      { pop: "9️⃣", name: "🦎 Calango-do-Sertão", type: "🟦 Base", complex: "🟢 Fácil" },
      { pop: "2️⃣", name: "🐗 Javali", type: "🟥 Predador", complex: "🔵 Muito Fácil" },
      { pop: "3️⃣", name: "🦊 Jaguatirica", type: "🟧 Subpredador", complex: "🟠 Difícil" },
      { pop: "4️⃣", name: "🦡 Tamanduá-Bandeira", type: "🟨 Meio", complex: "🔵 Muito Fácil" },
      { pop: "5️⃣", name: "🦍 Bugio-Preto", type: "🟨 Meio", complex: "🟡 Médio" },
      { pop: "6️⃣", name: "🦦 Ariranha", type: "🟧 Subpredador", complex: "🔴 Muito Difícil" },
      { pop: "9️⃣", name: "🐀 Camundongo", type: "🟦 Base", complex: "🟢 Fácil" },
      { pop: "2️⃣", name: "🦅 Osprey", type: "🟥 Predador", complex: "🟡 Médio" },
      { pop: "3️⃣", name: "🦉 Suindara", type: "🟧 Subpredador", complex: "🔴 Muito Difícil" },
      { pop: "5️⃣", name: "🦫 Capivara", type: "🟨 Meio", complex: "🟢 Fácil" },
      { pop: "6️⃣", name: "🦧 Mico-Leão-Dourado", type: "🟨 Meio", complex: "🟠 Difícil" },
      { pop: "8️⃣", name: "🦥 Preguiça", type: "🟨 Meio", complex: "🟡 Médio" },
      { pop: "9️⃣", name: "🐸 Sapo-Boi-Azul", type: "🟦 Base", complex: "🟡 Médio" },
      { pop: "5️⃣", name: "🦫 Capivara (Alternativa)", type: "🟨 Meio", complex: "🟢 Fácil" },
      { pop: "0️⃣", name: "🐈‍⬛ Pantera", type: "🟥 Predador", complex: "🔴 Muito Difícil" }
    ];

    function shuffleArray(array) {
      const arr = array.slice();
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function generateMatch() {
      const playerCount = parseInt(document.getElementById("players").value);
      const totalAnimals = playerCount <= 3 ? playerCount * 2 : playerCount;

      let valid = false;
      let selected = [];

      while (!valid) {
        const shuffled = shuffleArray(animals);
        selected = [];
        const usedNums = new Set();
        for (const animal of shuffled) {
          if (!usedNums.has(animal.pop)) {
            selected.push(animal);
            usedNums.add(animal.pop);
          }
          if (selected.length === totalAnimals) break;
        }

        const predadorCount = selected.filter(a => a.type === "🟥 Predador").length;
        const subpredadorCount = selected.filter(a => a.type === "🟧 Subpredador").length;
        const baseCount = selected.filter(a => a.type === "🟦 Base").length;

        valid = (predadorCount === 1 && baseCount >= 1 && baseCount <= 2) ||
                (subpredadorCount === 1 && baseCount === 3 && (totalAnimals === 2 || totalAnimals === 4));
      }

      const assignments = [];
      if (playerCount <= 3) {
        for (let i = 0; i < playerCount; i++) {
          const main = selected[i * 2];
          const support = selected[i * 2 + 1];
          assignments.push({ main, support });
        }
      } else {
        selected.forEach(a => assignments.push({ main: a }));
      }

      const resultDiv = document.getElementById("results");
      resultDiv.innerHTML = "";

      assignments.forEach((assignment, i) => {
        const block = document.createElement("div");
        block.className = "player-block";

        block.innerHTML = `
          <div class="animal-name">
            ${playerCount <= 3 ? "Principal: " : ""}${assignment.main.name}
          </div>
          <div class="animal-info">
            ${assignment.main.pop} | ${assignment.main.type} | ${assignment.main.complex}
          </div>
        `;

        if (assignment.support) {
          block.innerHTML += `
            <div class="animal-name">Suporte: ${assignment.support.name}</div>
            <div class="animal-info">
              ${assignment.support.pop} | ${assignment.support.type} | ${assignment.support.complex}
            </div>
          `;
        }

        resultDiv.appendChild(block);
      });
    }

    function resetResults() {
      document.getElementById("results").innerHTML = "";
    }
  </script>
</body>
</html>
